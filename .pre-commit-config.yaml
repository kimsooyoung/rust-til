# Pre-commit hooks for this repo.
# Chapters 1–3 only: other crates are intentionally tutorial-style and are not lint-gated here.
# Install: `pip install pre-commit` then `pre-commit install`
# Run manually: `pre-commit run --all-files`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: local
    hooks:
      # Only these three crates are checked; other packages are left as-is for learning demos.
      - id: rust-fmt-clippy-chapters-123
        name: cargo fmt + clippy (1_variables, 2_ownership, 3_functions only)
        entry: bash scripts/pre-commit-chapters-123.sh
        language: system
        pass_filenames: false
