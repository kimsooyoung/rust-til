# Pre-commit hooks for this repo.
# Covers all chapter crates with Cargo.toml (1_variables … 13_pcmp).
# Install: `pip install pre-commit` then `pre-commit install`
# Run manually: `pre-commit run --all-files`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: rust-fmt-clippy-check
        name: cargo fmt + clippy + check (all chapter crates)
        entry: bash scripts/pre-commit-rust.sh
        language: system
        pass_filenames: false
        files: '\.(rs|toml)$'
